name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project (dev + mlops extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mlops]"

      - name: Ruff
        run: ruff check wafer_defect_pipeline/ tests/ scripts/

      - name: Pytest
        run: pytest tests/ -q

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test

    strategy:
      matrix:
        target: [train, serve, mlflow]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.target }}
          push: false
          tags: wafer-defect-pipeline:ci-${{ matrix.target }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
