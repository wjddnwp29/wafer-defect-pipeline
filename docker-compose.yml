services:
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    volumes:
      - mlflow-data:/mlflow
    ports:
      - "5000:5000"

  serve-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.serve
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      WAFER_MODEL_URI: models:/wafer-defect-ddpm/Staging
    ports:
      - "8000:8000"
    depends_on:
      - mlflow

  serve-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.serve
    command: ["python", "-m", "wafer_defect_pipeline.serve.web"]
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      WAFER_MODEL_URI: models:/wafer-defect-ddpm/Staging
    ports:
      - "8001:8001"
    depends_on:
      - mlflow

  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - serve-api

volumes:
  mlflow-data:
